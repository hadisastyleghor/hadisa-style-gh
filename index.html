<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>হাদিসা স্টাইল ঘর | Hadisa Style Ghor</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
header{
    background:#222;
    color:white;
    padding:15px;
    text-align:center;
}
nav{
    background:#444;
    padding:10px;
    text-align:center;
}
nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}
.hero{
    text-align:center;
    padding:50px 20px;
    background:white;
}
.products{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}
.card{
    background:white;
    width:250px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}
.card img{
    width:100%;
    border-radius:8px;
}
.price{
    color:green;
    font-weight:bold;
}
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>
    <h1>হাদিসা স্টাইল ঘর</h1>
    <p>Hadisa Style Ghor</p>
</header>

<nav>
    <a href="#">হোম</a>
    <a href="#">পুরুষদের পোশাক</a>
    <a href="#">মহিলাদের পোশাক</a>
    <a href="#">নতুন কালেকশন</a>
    <a href="#">যোগাযোগ</a>
</nav>

<section class="hero">
    <h2>স্বাগতম হাদিসা স্টাইল ঘরে</h2>
    <p>রুচিশীল পোশাকে আপনার বিশ্বস্ত ঠিকানা</p>
</section>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="Panjabi">
        <h3>সাদা পাঞ্জাবি</h3>
        <p class="price">৳ 1500</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="Shirt">
        <h3>কটন শার্ট</h3>
        <p class="price">৳ 950</p>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="Three Piece">
        <h3>থ্রি-পিস</h3>
        <p class="price">৳ 2500</p>
    </div>

</section>

<footer>
    <p>© 2026 Hadisa Style Ghor | সকল স্বত্ব সংরক্ষিত</p>
</footer>

</body>
</html>
